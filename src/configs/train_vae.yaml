defaults:
  - model: vae
  - writer: cometml
  - metrics: vae
  - datasets: vae #_onebatchtest
  - dataloader: vae
  - transforms: vae
  - _self_
optimizer:
  _target_: torch.optim.AdamW
  lr: 3e-4
  weight_decay: 1e-5
lr_scheduler:
  _target_: torch.optim.lr_scheduler.OneCycleLR
  max_lr: ${optimizer.lr}
  epochs: ${trainer.n_epochs}
  steps_per_epoch: ${divide:${trainer.epoch_len},${trainer.accumulation_steps}}
  pct_start: 0.1
loss_function:
  _target_: src.loss.VAELoss
  kl_weight: 0.000001
  feature_loss_type: null # L1 or L2
  feature_loss_weight: 1
trainer:
  log_step: 100
  check_nan: False
  accumulation_steps: 8
  amp: 'no'
  profile_train: False
  profile_val: False
  memory_snapshot: False
  debug: False
  n_epochs: 100
  epoch_len: 1000
  device_tensors: ["block_type_grid", "attributes_masks", "attributes_values"] # which tensors should be on device (ex. GPU)
  resume_from: null # null or path to the checkpoint dir with *.pth and config.yaml
  device: auto # device name or "auto"
  override: True # if True, will override the previous run with the same name
  monitor: "max val_BlockTypeAccuracy" # "max test_MulticlassAccuracy" # "off" or "max/min metric_name", i.e. our goal is to maximize/minimize metric
  save_period: 5 # checkpoint each save_period epochs in addition to the best epoch
  early_stop: ${trainer.n_epochs} # epochs for early stopping
  save_dir: "saved"
  seed: 1
